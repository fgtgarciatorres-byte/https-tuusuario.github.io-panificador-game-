<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panificador - Run OK</title>
<style>
  body {
    margin: 0;
    background: #1e1e1e;
  }
  canvas {
    display: block;
    margin: auto;
    background: #dfe7ef;
  }
</style>
</head>
<body>

<canvas id="gameCanvas" width="900" height="450"></canvas>

<script>
// ==============================
// CONFIG
// ==============================
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// SPRITE
const sprite = new Image();
sprite.src = "panificador_run.png";

// MEDIDAS REALES
const FRAME_WIDTH = 224;
const FRAME_HEIGHT = 224;
const TOTAL_FRAMES = 8;

// 🔥 RECORTE (AJUSTADO A TU SPRITE)
const SPRITE_OFFSET_Y = 80;
const SPRITE_CROP_HEIGHT = 140;

// timing animación
const frameDurations = [120, 140, 100, 90, 120, 140, 100, 90];

// FÍSICAS
const GRAVITY = 2000;
const MOVE_SPEED = 260;
const JUMP_FORCE = 720;

// SUELO (posición de pies)
const GROUND_Y = 360;

// PLAYER
const player = {
  x: 100,
  y: GROUND_Y,
  vx: 0,
  vy: 0,
  scale: 0.7,
  onGround: true,
  frame: 0,
  frameTimer: 0,
  state: "idle",
  facing: 1
};

// INPUT
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// CÁMARA
let cameraX = 0;

// ==============================
// LOOP
// ==============================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;

  update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

// ==============================
// UPDATE
// ==============================
function update(dt) {

  player.vx = 0;

  if (keys["arrowright"] || keys["d"]) {
    player.vx = MOVE_SPEED;
    player.facing = 1;
  }

  if (keys["arrowleft"] || keys["a"]) {
    player.vx = -MOVE_SPEED;
    player.facing = -1;
  }

  if ((keys[" "] || keys["arrowup"] || keys["w"]) && player.onGround) {
    player.vy = -JUMP_FORCE;
    player.onGround = false;
  }

  // físicas
  player.vy += GRAVITY * dt;
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // suelo
  if (player.y >= GROUND_Y) {
    player.y = GROUND_Y;
    player.vy = 0;
    player.onGround = true;
  }

  // estado
  if (!player.onGround) {
    player.state = "jump";
  } else if (player.vx !== 0) {
    player.state = "run";
  } else {
    player.state = "idle";
  }

  // animación
  if (player.state === "run") {
    player.frameTimer += dt * 1000;

    if (player.frameTimer >= frameDurations[player.frame]) {
      player.frameTimer = 0;
      player.frame = (player.frame + 1) % TOTAL_FRAMES;
    }
  } else if (player.state === "idle") {
    player.frame = 0;
  } else if (player.state === "jump") {
    player.frame = 3;
  }

  // cámara
  cameraX = player.x - canvas.width / 2 + 100;
}

// ==============================
// DRAW
// ==============================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // suelo
  ctx.fillStyle = "#444";
  ctx.fillRect(0, GROUND_Y, canvas.width, 4);

  ctx.save();
  ctx.translate(-cameraX, 0);

  const drawX = player.x;
  const drawY = player.y - SPRITE_CROP_HEIGHT * player.scale;

  if (player.facing === -1) {
    ctx.scale(-1, 1);

    ctx.drawImage(
      sprite,
      player.frame * FRAME_WIDTH,
      SPRITE_OFFSET_Y,
      FRAME_WIDTH,
      SPRITE_CROP_HEIGHT,
      -drawX - FRAME_WIDTH * player.scale,
      drawY,
      FRAME_WIDTH * player.scale,
      SPRITE_CROP_HEIGHT * player.scale
    );

  } else {
    ctx.drawImage(
      sprite,
      player.frame * FRAME_WIDTH,
      SPRITE_OFFSET_Y,
      FRAME_WIDTH,
      SPRITE_CROP_HEIGHT,
      drawX,
      drawY,
      FRAME_WIDTH * player.scale,
      SPRITE_CROP_HEIGHT * player.scale
    );
  }

  ctx.restore();
}

// ==============================
// START
// ==============================
sprite.onload = () => {
  requestAnimationFrame(gameLoop);
};
</script>

</body>
</html>
